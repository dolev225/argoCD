---
# Source: myapp/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: test-2-svc
  labels:
    app: test-2
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  selector:
    app: test-2
---
# Source: myapp/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-2-deploy
  labels:
    app: test-2-deploy
spec:
  selector: 
    matchLabels:
      app: test-2
  replicas: 3   #from values
  template:
    metadata:
      labels:
        app: test-2
    spec:
      containers:
      - name: test-2 #from values
        image: dolev1234/test-2:2
        ports:
        - containerPort: 8000
---
# Source: myapp/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name:  test-2-ingress
  labels:
    app: test-2
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix  
            backend:
              service:
                name:  test-2-svc
                port:
                  number: 80
